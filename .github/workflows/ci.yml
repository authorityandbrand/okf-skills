name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Validate plugin & marketplace manifests
        run: jq empty .claude-plugin/plugin.json .claude-plugin/marketplace.json

      - name: Unit tests — okf_validate internals
        run: uv run tests/test_okf_validate.py

      - name: Validate example bundle (strict)
        run: uv run skills/validate/scripts/okf_validate.py examples/sample-bundle --strict

      - name: Validate this repo's own .okf bundle (strict, dogfooding)
        run: uv run skills/validate/scripts/okf_validate.py .okf --strict

      - name: Self-test — success output survives a cp1252 console (Windows regression)
        run: |
          # The ✓/✗/— glyphs crashed both scripts on default Windows consoles
          # (cp1252) until the _force_utf8_stdio() fix; simulate that codepage.
          PYTHONIOENCODING=cp1252 uv run skills/validate/scripts/okf_validate.py examples/sample-bundle
          echo "ok: validate output survives cp1252"

      - name: Self-test — a non-conformant bundle must fail
        run: |
          tmp="$(mktemp -d)"
          printf 'no frontmatter\n' > "$tmp/bad.md"
          if uv run skills/validate/scripts/okf_validate.py "$tmp"; then
            echo "validator failed to reject a non-conformant bundle" >&2
            exit 1
          fi
          echo "ok: non-conformant bundle correctly rejected"

      - name: Self-test — script-breaking sequences in concept bodies are neutralized
        run: |
          # A concept body may legitimately contain </script> (ends the inline
          # data script early), <!--<script (arms the script-data double-escaped
          # state, where even the template's real closing tag stops working), or
          # the literal string __EDGES__ (a naive template substitution would
          # splice the edges JSON into the middle of a node body). None of these
          # may corrupt the generated page. Assertions are on outcomes, not on a
          # specific escaping strategy.
          tmp="$(mktemp -d)"
          cat > "$tmp/snippet.md" <<'MD'
          ---
          type: Reference
          title: Snippet with hostile-looking but benign content
          ---
          Example markup a doc might contain:

          ```html
          <script src="app.js"></script>REPRO_MARKER
          <!--<script>DOUBLE_ESCAPE_MARKER
          ```

          The template placeholder __EDGES__ SPLICE_MARKER must survive verbatim.
          MD
          uv run skills/visualize/scripts/okf_visualize.py "$tmp" -o "$tmp/viz.html"
          grep -qF 'REPRO_MARKER' "$tmp/viz.html" || {
            echo "concept body went missing from the output entirely" >&2
            exit 1
          }
          if grep -qF '</script>REPRO_MARKER' "$tmp/viz.html"; then
            echo "raw </script> from a concept body leaked into the inline data script" >&2
            exit 1
          fi
          if grep -qF '<!--<script>DOUBLE_ESCAPE_MARKER' "$tmp/viz.html"; then
            echo "raw <!--<script leaked (script-data double-escaped state hazard)" >&2
            exit 1
          fi
          grep -qF '__EDGES__ SPLICE_MARKER' "$tmp/viz.html" || {
            echo "literal __EDGES__ in a concept body was clobbered by template substitution" >&2
            exit 1
          }
          echo "ok: script-breaking sequences in concept bodies are neutralized"

      - name: Self-test — concept body markdown is sanitized before innerHTML (XSS)
        run: |
          # A concept body is untrusted content — it must never execute script
          # when rendered. Assertions are outcome-level: the DOMPurify hook is
          # wired into the page and it wraps the marked.parse(...) call, not on
          # a specific escaping strategy.
          tmp="$(mktemp -d)"
          cat > "$tmp/c.md" <<'MD'
          ---
          type: Reference
          title: XSS probe
          ---
          <img src=x onerror="document.title='pwned'">
          MD
          uv run skills/visualize/scripts/okf_visualize.py "$tmp" -o "$tmp/viz.html"
          grep -q "dompurify" "$tmp/viz.html" || {
            echo "DOMPurify is not loaded in the generated page" >&2
            exit 1
          }
          grep -qE 'DOMPurify\.sanitize\(marked\.parse\(' "$tmp/viz.html" || {
            echo "marked.parse(...) output is not wrapped in DOMPurify.sanitize(...)" >&2
            exit 1
          }
          echo "ok: concept body rendering is sanitized"

      - name: Self-test — scale guardrails (auto linear layout, --max-nodes cap)
        run: |
          # Force (cose) layout freezes the page on large bundles (~32 s at 2k
          # concepts, measured in Chrome), so above AUTO_COSE_MAX the default
          # must fall back to a linear layout, and --max-nodes must refuse
          # oversized bundles. Assertions are on outcomes: the note on stderr,
          # the layout baked into the page, and the cap's non-zero exit.
          tmp="$(mktemp -d)"
          python3 - "$tmp" <<'PY'
          import pathlib, sys
          root = pathlib.Path(sys.argv[1])
          for i in range(1200):
              (root / f"c{i:04d}.md").write_text(
                  f"---\ntype: Reference\ntitle: c{i}\n---\n\nSee [next](c{(i + 1) % 1200:04d}.md).\n",
                  encoding="utf-8")
          PY
          uv run skills/visualize/scripts/okf_visualize.py "$tmp" -o "$tmp/viz.html" 2>"$tmp/err.txt"
          grep -q "using the linear 'concentric' layout" "$tmp/err.txt" || {
            echo "large bundle did not report the auto layout fallback" >&2
            exit 1
          }
          grep -qF "layout:{name:'concentric'" "$tmp/viz.html" || {
            echo "large bundle did not bake the linear fallback layout into the page" >&2
            exit 1
          }
          uv run skills/visualize/scripts/okf_visualize.py "$tmp" -o "$tmp/viz2.html" --layout cose
          grep -qF "layout:{name:'cose'" "$tmp/viz2.html" || {
            echo "explicit --layout cose was not honored" >&2
            exit 1
          }
          if uv run skills/visualize/scripts/okf_visualize.py "$tmp" -o "$tmp/viz3.html" --max-nodes 1000; then
            echo "--max-nodes failed to refuse an oversized bundle" >&2
            exit 1
          fi
          echo "ok: scale guardrails behave"

  validate-windows:
    # Real regression coverage for the cp1252 class of bug: a genuine Windows
    # console (not a simulated codepage on Linux) defaults to cp1252, which is
    # what originally crashed the ✓/✗/— glyphs.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Unit tests — okf_validate internals
        run: uv run tests/test_okf_validate.py

      - name: Validate example bundle (strict, native cp1252 console)
        run: uv run skills/validate/scripts/okf_validate.py examples/sample-bundle --strict
